<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loss Curve Explorer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --block-color: #1e293b;
            --border-color: #475569;
            --highlight-color: #fbbf24;
            --success-color: #34d399;
            --danger-color: #f87171;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-weight: 300; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        .main-layout {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
            align-items: flex-start;
        }

        .controls-panel {
            background-color: var(--block-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }

        .control-group .value-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-color);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-btn {
            background-color: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .toggle-btn:hover { background-color: rgba(56, 189, 248, 0.2); }
        .toggle-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        .chart-area {
            flex: 1;
            background-color: var(--block-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 380px;
            display: block;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        .milestone-list {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .milestone-list .title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .milestone {
            font-size: 12px;
            color: #94a3b8;
            padding: 4px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .milestone .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <h1>Loss Curve Explorer</h1>
    <div class="subtitle">Drag sliders to see how hyperparameters shape training dynamics.</div>

    <div class="main-layout">
        <div class="controls-panel">
            <div class="control-group">
                <label>Max Steps</label>
                <span class="value-display" id="maxStepsVal">5000</span>
                <input type="range" id="maxSteps" min="500" max="10000" step="500" value="5000">
            </div>
            <div class="control-group">
                <label>Warmup Steps</label>
                <span class="value-display" id="warmupVal">100</span>
                <input type="range" id="warmupSteps" min="0" max="1000" step="50" value="100">
            </div>
            <div class="control-group">
                <label>Max Learning Rate</label>
                <span class="value-display" id="lrVal">1.0e-3</span>
                <input type="range" id="maxLR" min="1" max="50" step="1" value="10">
            </div>
            <div class="control-group">
                <label>Model Size (params M)</label>
                <span class="value-display" id="modelSizeVal">10M</span>
                <input type="range" id="modelSize" min="1" max="20" step="1" value="10">
            </div>
            <div class="toggle-row">
                <label>Show Overfitting</label>
                <button class="toggle-btn active" id="overfitToggle">On</button>
            </div>
            <div class="toggle-row">
                <label>Animate Training</label>
                <button class="toggle-btn" id="animateToggle">Off</button>
            </div>

            <div class="milestone-list">
                <div class="title">Loss Benchmarks</div>
                <div class="milestone"><span class="dot" style="background:#f87171;"></span>~4.17 = Random (ln 65)</div>
                <div class="milestone"><span class="dot" style="background:#fbbf24;"></span>~2.5 = Bigrams learned</div>
                <div class="milestone"><span class="dot" style="background:#34d399;"></span>~1.5 = Coherent text</div>
                <div class="milestone"><span class="dot" style="background:#38bdf8;"></span>&lt;1.0 = Memorizing</div>
            </div>
        </div>

        <div class="chart-area">
            <canvas id="lossCanvas" width="700" height="380"></canvas>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-color);"></div>
                    <span>Train Loss</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--success-color);"></div>
                    <span>Val Loss</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--highlight-color);"></div>
                    <span>Learning Rate</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('lossCanvas');
        const ctx = canvas.getContext('2d');

        const maxStepsInput = document.getElementById('maxSteps');
        const warmupInput = document.getElementById('warmupSteps');
        const maxLRInput = document.getElementById('maxLR');
        const modelSizeInput = document.getElementById('modelSize');
        const overfitToggle = document.getElementById('overfitToggle');
        const animateToggle = document.getElementById('animateToggle');

        const maxStepsVal = document.getElementById('maxStepsVal');
        const warmupVal = document.getElementById('warmupVal');
        const lrVal = document.getElementById('lrVal');
        const modelSizeVal = document.getElementById('modelSizeVal');

        let animStep = 0;
        let animTimer = null;
        let isAnimating = false;

        function getLR(step, maxSteps, warmupSteps, maxLR) {
            const min_lr = maxLR * 0.1;
            if (step < warmupSteps) return maxLR * (step + 1) / Math.max(1, warmupSteps);
            if (step >= maxSteps) return min_lr;
            const progress = (step - warmupSteps) / Math.max(1, maxSteps - warmupSteps);
            return min_lr + 0.5 * (maxLR - min_lr) * (1 + Math.cos(Math.PI * progress));
        }

        function computeCurves(maxSteps, warmup, maxLR, modelSizeM, overfit) {
            const steps = [];
            const train = [];
            const val = [];
            const lr = [];

            const dataSize = 1.0; // 1M chars
            const capacity = modelSizeM / dataSize; // param-to-data ratio

            for (let s = 0; s <= maxSteps; s += Math.max(1, Math.floor(maxSteps / 400))) {
                steps.push(s);
                const currentLR = getLR(s, maxSteps, warmup, maxLR);
                lr.push(currentLR);

                // Train loss: smooth decay with noise
                const tBase = 4.17 * Math.exp(-s / (800 + modelSizeM * 40)) + 0.25;
                const tNoise = Math.sin(s * 0.05) * 0.04 + Math.cos(s * 0.12) * 0.02;
                train.push(Math.max(0.2, tBase + tNoise));

                // Val loss: similar but diverges if overfitting
                const vBase = 4.17 * Math.exp(-s / (900 + modelSizeM * 50)) + 0.35;
                const vNoise = Math.sin(s * 0.04 + 1) * 0.05 + Math.cos(s * 0.09) * 0.03;
                let vVal = vBase + vNoise;

                if (overfit && capacity > 5) {
                    const overfitStart = 1500 + (20 - modelSizeM) * 100;
                    if (s > overfitStart) {
                        const overfitAmt = Math.min(2.5, (s - overfitStart) / 800 * (capacity / 5));
                        vVal += overfitAmt;
                    }
                }
                val.push(Math.max(0.3, vVal));
            }
            return { steps, train, val, lr };
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const padL = 50, padR = 20, padT = 20, padB = 40;
            const plotW = w - padL - padR;
            const plotH = h - padT - padB;

            ctx.clearRect(0, 0, w, h);

            const maxSteps = parseInt(maxStepsInput.value, 10);
            const warmup = parseInt(warmupInput.value, 10);
            const maxLR = parseInt(maxLRInput.value, 10) * 1e-4;
            const modelSizeM = parseInt(modelSizeInput.value, 10);
            const overfit = overfitToggle.classList.contains('active');

            const data = computeCurves(maxSteps, warmup, maxLR, modelSizeM, overfit);
            const limitSteps = isAnimating ? animStep : maxSteps;

            // Filter to visible range
            const visible = {
                steps: data.steps.filter(s => s <= limitSteps),
                train: data.train.slice(0, data.steps.filter(s => s <= limitSteps).length),
                val: data.val.slice(0, data.steps.filter(s => s <= limitSteps).length),
                lr: data.lr.slice(0, data.steps.filter(s => s <= limitSteps).length),
            };

            if (visible.steps.length === 0) return;

            const xScale = plotW / maxSteps;
            const maxLoss = 5.0;
            const yScale = plotH / maxLoss;
            const maxLRViz = 0.005;
            const lrScale = plotH / maxLRViz;

            // Grid
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padT + (i / 5) * plotH;
                ctx.beginPath();
                ctx.moveTo(padL, y);
                ctx.lineTo(padL + plotW, y);
                ctx.stroke();

                ctx.fillStyle = '#64748b';
                ctx.font = '11px "JetBrains Mono", monospace';
                ctx.textAlign = 'right';
                ctx.fillText((5 - i).toFixed(1), padL - 8, y + 4);
            }

            for (let i = 0; i <= 5; i++) {
                const x = padL + (i / 5) * plotW;
                ctx.beginPath();
                ctx.moveTo(x, padT);
                ctx.lineTo(x, padT + plotH);
                ctx.stroke();

                ctx.fillStyle = '#64748b';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round((i / 5) * maxSteps).toString(), x, padT + plotH + 16);
            }

            // Axis labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Training Steps', padL + plotW / 2, h - 2);

            ctx.save();
            ctx.translate(14, padT + plotH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('Loss', 0, 0);
            ctx.restore();

            // Benchmark lines
            const benchmarks = [
                { y: 4.17, color: '#f87171', label: 'random' },
                { y: 2.5, color: '#fbbf24', label: 'bigrams' },
                { y: 1.5, color: '#34d399', label: 'coherent' },
            ];
            benchmarks.forEach(b => {
                const by = padT + (maxLoss - b.y) * yScale;
                if (by >= padT && by <= padT + plotH) {
                    ctx.strokeStyle = b.color;
                    ctx.globalAlpha = 0.3;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(padL, by);
                    ctx.lineTo(padL + plotW, by);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.globalAlpha = 1;

                    ctx.fillStyle = b.color;
                    ctx.font = '10px "JetBrains Mono", monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText(b.label, padL + plotW + 4, by + 3);
                }
            });

            function drawLine(values, color, scale, offset = 0) {
                if (values.length < 2) return;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < values.length; i++) {
                    const x = padL + visible.steps[i] * xScale;
                    const y = padT + plotH - (values[i] - offset) * scale;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            drawLine(visible.train, '#38bdf8', yScale);
            drawLine(visible.val, '#34d399', yScale);
            drawLine(visible.lr, '#fbbf24', lrScale, 0);

            // Overfitting annotation
            if (overfit && visible.val.length > 10) {
                let minVal = Infinity;
                let minIdx = -1;
                for (let i = 0; i < visible.val.length; i++) {
                    if (visible.val[i] < minVal) {
                        minVal = visible.val[i];
                        minIdx = i;
                    }
                }
                if (minIdx > 5 && visible.steps[minIdx] < limitSteps * 0.9) {
                    const x = padL + visible.steps[minIdx] * xScale;
                    const y = padT + plotH - minVal * yScale;
                    ctx.fillStyle = '#f87171';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Best val loss', x, y - 10);
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function updateLabels() {
            maxStepsVal.textContent = maxStepsInput.value;
            warmupVal.textContent = warmupInput.value;
            lrVal.textContent = (parseInt(maxLRInput.value, 10) * 1e-4).toExponential(2);
            modelSizeVal.textContent = modelSizeInput.value + 'M';
        }

        [maxStepsInput, warmupInput, maxLRInput, modelSizeInput].forEach(el => {
            el.addEventListener('input', () => {
                updateLabels();
                animStep = 0;
                draw();
            });
        });

        overfitToggle.addEventListener('click', () => {
            overfitToggle.classList.toggle('active');
            overfitToggle.textContent = overfitToggle.classList.contains('active') ? 'On' : 'Off';
            draw();
        });

        animateToggle.addEventListener('click', () => {
            isAnimating = !isAnimating;
            animateToggle.classList.toggle('active', isAnimating);
            animateToggle.textContent = isAnimating ? 'On' : 'Off';

            if (isAnimating) {
                animStep = 0;
                const maxSteps = parseInt(maxStepsInput.value, 10);
                animTimer = setInterval(() => {
                    animStep += Math.max(1, Math.floor(maxSteps / 200));
                    if (animStep >= maxSteps) {
                        animStep = maxSteps;
                        isAnimating = false;
                        animateToggle.classList.remove('active');
                        animateToggle.textContent = 'Off';
                        clearInterval(animTimer);
                    }
                    draw();
                }, 30);
            } else {
                clearInterval(animTimer);
            }
        });

        window.addEventListener('resize', draw);
        updateLabels();
        draw();
    </script>
</body>
</html>
